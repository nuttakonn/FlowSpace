name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend: Build & Test (.NET)
  # ─────────────────────────────────────────────
  api:
    name: API — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore apps/api/FlowSpace.slnx

      - name: Build
        run: dotnet build apps/api/FlowSpace.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test apps/api/FlowSpace.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: '**/TestResults/**'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Frontend: Lint, Type-check & Test (Next.js)
  # ─────────────────────────────────────────────
  web:
    name: Web — Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Type-check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Test
        working-directory: apps/web
        run: npx vitest run
        env:
          CI: true
